<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 160" width="280" height="160">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071520"/>
      <stop offset="50%" stop-color="#0a1e2e"/>
      <stop offset="100%" stop-color="#061018"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Ocean base -->
  <rect width="280" height="160" fill="url(#sky)"/>
  <!-- Deep water variation -->
  <ellipse cx="200" cy="40" rx="90" ry="45" fill="#0c2238" opacity="0.5"/>
  <ellipse cx="60" cy="130" rx="70" ry="40" fill="#0e2540" opacity="0.4"/>
  <!-- Land masses -->
  <path d="M30 20 Q50 15 70 25 Q90 35 85 60 Q80 85 60 95 Q40 105 25 90 Q10 75 15 50 Q20 30 30 20Z" fill="#1a3a28" opacity="0.9"/>
  <path d="M55 55 Q65 50 75 58 Q80 65 72 72 Q62 78 55 70 Q50 62 55 55Z" fill="#0f2a1e" opacity="0.6"/>
  <path d="M120 70 Q155 55 190 65 Q210 72 215 95 Q218 120 200 135 Q175 148 150 140 Q125 132 118 110 Q112 88 120 70Z" fill="#1c3d2a" opacity="0.85"/>
  <path d="M155 80 Q170 75 180 85 Q185 95 175 102 Q165 108 155 100 Q148 92 155 80Z" fill="#142e20" opacity="0.5"/>
  <!-- UK-shaped island -->
  <path d="M230 18 Q238 12 245 20 Q250 35 248 55 Q245 70 240 80 Q235 88 238 100 Q240 110 235 118 Q228 125 222 115 Q218 105 220 90 Q222 75 225 65 Q228 50 232 40 Q234 28 230 18Z" fill="#1e4230" opacity="0.9"/>
  <path d="M232 35 Q236 30 240 38 Q242 48 238 55 Q234 50 232 42Z" fill="#265538" opacity="0.4"/>
  <!-- City light clusters -->
  <g filter="url(#glow)" opacity="0.7">
    <circle cx="45" cy="55" r="1.2" fill="#fbbf24"/>
    <circle cx="50" cy="60" r="0.8" fill="#fbbf24"/>
    <circle cx="155" cy="95" r="1.5" fill="#fbbf24"/>
    <circle cx="160" cy="100" r="1" fill="#fbbf24"/>
    <circle cx="165" cy="92" r="0.7" fill="#fbbf24"/>
    <circle cx="235" cy="75" r="1.3" fill="#fbbf24"/>
    <circle cx="238" cy="82" r="0.9" fill="#fbbf24"/>
    <circle cx="233" cy="100" r="1.1" fill="#fbbf24"/>
    <circle cx="240" cy="95" r="0.6" fill="#fbbf24"/>
  </g>
  <!-- Cloud wisps -->
  <ellipse cx="100" cy="30" rx="35" ry="8" fill="white" opacity="0.04"/>
  <ellipse cx="180" cy="140" rx="40" ry="6" fill="white" opacity="0.03"/>
  <!-- Coastline highlights -->
  <path d="M30 20 Q50 15 70 25 Q90 35 85 60 Q80 85 60 95 Q40 105 25 90" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.25"/>
  <path d="M120 70 Q155 55 190 65 Q210 72 215 95 Q218 120 200 135 Q175 148 150 140" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.2"/>
</svg>
