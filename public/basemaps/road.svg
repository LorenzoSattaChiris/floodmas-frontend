    <rect x="48" y="105" width="26" height="20" rx="1" fill="#2d3d50"/>
    <rect x="78" y="110" width="14" height="14" rx="1" fill="#354860"/>
    <rect x="135" y="112" width="24" height="16" rx="1" fill="#2d3d50"/>
    <rect x="162" y="108" width="18" height="22" rx="1" fill="#324458"/>
