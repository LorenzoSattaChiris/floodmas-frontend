  <path d="M0 32 Q100 26 200 34 Q250 38 280 32" fill="none" stroke="#e2e8f0" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
  <path d="M0 130 Q80 122 160 128 Q240 134 280 126" fill="none" stroke="#e2e8f0" stroke-width="1.8" opacity="0.3" stroke-linecap="round"/>
