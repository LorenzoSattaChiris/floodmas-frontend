  </g>
  <!-- Green spaces -->
  <rect x="110" y="16" width="28" height="18" rx="3" fill="#1e3a2a" opacity="0.5"/>
  <rect x="240" y="55" width="24" height="16" rx="3" fill="#1e3a2a" opacity="0.45"/>
  <circle cx="105" cy="130" r="10" fill="#1e3a2a" opacity="0.4"/>
